<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Revision of JS</title>
  </head>
  <body>
    <h1>Hello welcome to the cart</h1>
    <div>
      <button onclick="alert(`hello welcome to cart`)">Hello</button>
    </div>

    <button onclick="console.log(`Cart Quantity: ${cartQuantity}`)">
      Show Qunatity
    </button>

    <button
      onclick="
        cartQuantity++;
        console.log(`cart quantity: ${cartQuantity}`);
      "
    >
      Add +1
    </button>

    <button
      onclick="
        if (cartQuantity + 2 <= cartLimit) {
          cartQuantity += 2;
          console.log(`cart quantity: ${cartQuantity}`);
        } else {
          alert(
            `cart quantity has maximum capacity fo 10 items, can adda items to cart`,
          );
        }
      "
    >
      Add +2
    </button>

    <button
      onclick="
        if (cartQuantity - 2 >= 0) {
          cartQuantity -= 2;
          console.log(`cart quantity: ${cartQuantity}`);
        } else {
          alert(`cart quantity should not be negative`);
        }
      "
    >
      remove -2
    </button>

    <button
      onclick="
        cartQuantity = 0;
        console.log(`cart quantity: ${cartQuantity}`);
      "
    >
      Reset Cart
    </button>
    <script src="./index.js"></script>
  </body>
